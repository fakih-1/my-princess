<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>buat tuan putri jakbar</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; }

    .slide-enter { animation: slideIn 0.6s forwards; }
    .slide-exit { animation: slideOut 0.4s forwards; }

    @keyframes slideIn {
      from { transform: translateX(80px) scale(0.9); opacity: 0; }
      to { transform: translateX(0) scale(1); opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-80px); opacity: 0; }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.3);
        opacity: 0;
      }
    }

    .sparkle-dot {
      position: absolute;
      font-size: 24px; 
      animation: floatUp linear infinite;
      pointer-events: none;
      opacity: 0.85;
    }

    @keyframes wiggle {
      0%,100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }

    .wiggle {
      animation: wiggle 1s infinite;
    }

    .quote-text {
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    @keyframes glowFrame {
      0% {
        box-shadow: 0 0 10px rgba(255,79,163,0.4),
                    0 0 20px rgba(255,79,163,0.3),
                    0 0 30px rgba(255,79,163,0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 20px rgba(255,79,163,0.7),
                    0 0 40px rgba(255,79,163,0.5),
                    0 0 60px rgba(255,79,163,0.3);
        transform: scale(1.02);
      }
      100% {
        box-shadow: 0 0 10px rgba(255,79,163,0.4),
                    0 0 20px rgba(255,79,163,0.3),
                    0 0 30px rgba(255,79,163,0.2);
        transform: scale(1);
      }
    }

    .video-frame {
      padding: 8px;
      border-radius: 28px;
      background: linear-gradient(135deg, #ff4fa3, #ff9ccf, #ffd6ec);
      animation: glowFrame 2.5s infinite ease-in-out;
    }

  </style>
</head>

<body class="h-full overflow-hidden">

<div id="app" class="h-full w-full relative overflow-hidden flex items-center justify-center"
  style="background:#FFFFFF;">

  <div id="sparkles" class="absolute inset-0 z-0"></div>

  <div id="startSlide" class="absolute z-20 flex flex-col items-center justify-center gap-1">

    <img src="foto/pesan.png"
      onclick="startApp()"
      class="wiggle cursor-pointer"
      style="width:160px; background:transparent;"> 

    <span style="font-family:'Baloo 2'; font-weight:700; color:black; font-size:22px;">
      klik
    </span>

  </div>

  <div id="mainContent" class="hidden relative z-10 flex flex-col items-center justify-center w-full h-full px-6">

    <div id="videoFrame" class="video-frame slide-enter">
      <video id="videoPlayer" autoplay muted loop
        class="slide-enter"
        style="width:260px; height:260px; object-fit:cover; border-radius:20px; margin-bottom:0px;">
      </video>
    </div>

    <div id="quoteBox" class="slide-enter text-center max-w-lg px-4 mt-5">
      <p id="quoteText"
        class="quote-text text-2xl md:text-3xl font-bold"
        style="font-family:'Baloo 2'; color:#000;">
      </p>
    </div>

    <div class="mt-8 z-20">
      <button onclick="navigate(1)"
        class="px-8 py-3 rounded-full flex items-center gap-2 hover:scale-110 active:scale-95"
        style="background:#FF4FA3; color:#fff; font-family:'Baloo 2'; font-weight:700;">
        next :v
      </button>
    </div>

  </div>
</div>

<audio id="bgMusic" loop>
  <source src="lagu/lagu.mp3">
</audio>

<script>

const videoSources = [
  'vidio/1.mp4',
  'vidio/2.mp4',
  'vidio/3.mp4',
  'vidio/4.mp4',
  'vidio/5.mp4'
];

const bgMusic = document.getElementById('bgMusic');

const defaultConfig = {
  slide_1_text: "kamu mau tau nggak hadiah terbesar aku tahun ini?",
  slide_2_text: "ya… jawabannya kamu hehehe 😝",
  slide_3_text: "makasih yaa udah hadir dan bikin hari-hari aku jadi lebih berwarna dari biasanya 😌",
  slide_4_text: "aku nggak minta banyak kok, cuma pengen kamu tetep ada dan jadi orang yang selalu bisa bikin aku nyaman 🙂",
  slide_5_text: "semoga kedepannya kita bakal tetep sedeket ini yaa, tetep saling ada, saling ngerti, dan nggak asing satu sama lain 🥰"
};

let currentSlide = 0;
let isAnimating = false;

function createLove() {
  const container = document.getElementById('sparkles');

  for (let i = 0; i < 150; i++) {
    const love = document.createElement('div');
    love.className = 'sparkle-dot';
    love.innerHTML = '🩷';

    love.style.left = Math.random() * 100 + '%';
    love.style.bottom = (-100 - Math.random() * 1200) + 'px';

    love.style.animationDuration = (4 + Math.random() * 3) + 's';
    love.style.animationDelay = (Math.random() * 10) + 's';

    container.appendChild(love);
  }
}

function getSlides(cfg) {
  return [
    cfg.slide_1_text,
    cfg.slide_2_text,
    cfg.slide_3_text,
    cfg.slide_4_text,
    cfg.slide_5_text
  ];
}

function renderSlide(cfg) {
  const slides = getSlides(cfg);
  document.getElementById('quoteText').textContent = slides[currentSlide];
  document.getElementById('videoPlayer').src = videoSources[currentSlide];
}

function navigate(dir) {
  if (isAnimating) return;
  isAnimating = true;

  const box = document.getElementById('quoteBox');
  const video = document.getElementById('videoPlayer');
  const frame = document.getElementById('videoFrame');

  box.classList.remove('slide-enter');
  box.classList.add('slide-exit');

  video.classList.remove('slide-enter');
  video.classList.add('slide-exit');

  frame.classList.remove('slide-enter');
  frame.classList.add('slide-exit');

  setTimeout(() => {
    currentSlide = (currentSlide + dir + 5) % 5;
    renderSlide(defaultConfig);

    box.classList.remove('slide-exit');
    box.classList.add('slide-enter');

    video.classList.remove('slide-exit');
    video.classList.add('slide-enter');

    frame.classList.remove('slide-exit');
    frame.classList.add('slide-enter');

    setTimeout(() => { isAnimating = false; }, 600);
  }, 400);
}

function startApp() {
  document.getElementById('startSlide').style.display = 'none';
  document.getElementById('mainContent').classList.remove('hidden');

  renderSlide(defaultConfig);
  lucide.createIcons();
  bgMusic.play().catch(()=>{});
}

createLove();

</script>

</body>
</html>
